<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KuroKyu</title>
    <link rel="icon" type="image/jpeg" href="/src/assets/doge.jpg">
    <style>
        @font-face {
            font-family: 'KleeOne';
            src: url('/src/assets/fonts/KleeOne-SemiBold.woff2') format('woff2');
            font-weight: 600;
            font-style: normal;
            font-display: swap;
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #2b2b2b;
            --text: #ffffff;
        }

        @keyframes bgFadeWhite {
            0% {
                background: #2b2b2b;
            }

            100% {
                background: #F8F9FA;
            }
        }

        html,
        body {
            width: 100%;
            height: 100%;
            background: var(--bg);
            overflow: hidden;
            font-family: 'KleeOne', serif;
            /* cursor: none; */
        }

        #grain {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            opacity: 0.1;
        }

        #stage-wrap {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        #box {
            position: relative;
            width: min(440px, 86vw);
            padding: 52px 40px;
            /* border: 1.5px solid rgba(26, 26, 26, 0.13); */
            border-radius: 3px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 160px;
            opacity: 0;
            transform: scale(0.96) translateY(8px);
            transition: opacity 0.35s cubic-bezier(0.22, 1, 0.36, 1),
                transform 0.35s cubic-bezier(0.22, 1, 0.36, 1);
        }

        #box.show {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        #stage {
            position: relative;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 90px;
        }

        @keyframes drift {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1) rotate(0deg);
            }

            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(0) rotate(var(--tr));
            }
        }

        @keyframes pageBlurOut {
            0% {
                opacity: 1;
                filter: blur(0px);
                background: #2b2b2b;
            }

            100% {
                opacity: 1;
                filter: blur(0px);
                background: #ffffff;
            }
        }

        body.exit {
            animation: pageBlurOut 1s ease forwards;
        }
    </style>
</head>

<body>

    <canvas id="grain"></canvas>
    <script>
        (function () {
            const c = document.getElementById('grain'), ctx = c.getContext('2d')
            let last = 0
            function resize() { c.width = innerWidth; c.height = innerHeight }
            resize(); addEventListener('resize', resize)
            function draw() {
                const w = c.width, h = c.height, img = ctx.createImageData(w, h), d = img.data
                for (let i = 0; i < d.length; i += 4) { const v = Math.random() * 255 | 0; d[i] = d[i + 1] = d[i + 2] = v; d[i + 3] = 255 }
                ctx.putImageData(img, 0, 0)
            }
            function loop(ts) {
                requestAnimationFrame(loop)
                if (ts - last < 1000 / 12) return
                last = ts; draw()
            }
            loop(0)
        })()
    </script>

    <div id="parts" style="position:fixed;inset:0;pointer-events:none;z-index:20;"></div>

    <div id="stage-wrap">
        <div id="box">
            <div id="stage"></div>
        </div>
    </div>

    <script>
            (function () {
                const C = '#1a1a1a'
                const box = document.getElementById('box')
                const stage = document.getElementById('stage')
                const parts = document.getElementById('parts')

                const rf = () => new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)))
                const wait = ms => new Promise(r => setTimeout(r, ms))

                function mk(tag, css, text) {
                    const el = document.createElement(tag)
                    el.style.cssText = css
                    if (text !== undefined) el.textContent = text
                    return el
                }

                async function phase1() {
                    const CHARS = ['く', 'ろ', 'き', 'ゅ', 'う']
                    const OFFSETS = [-24, 24, -24, 24, -24]
                    const SIZE = 'clamp(44px,9vw,72px)'

                    const wrap = mk('div',
                        'display:flex;align-items:center;justify-content:center;gap:clamp(8px,2vw,18px);'
                    )
                    stage.appendChild(wrap)

                    const spans = CHARS.map((ch, i) => {
                        const s = mk('span', `
          display:inline-block;
          font-family:'KleeOne', serif;
          font-size:${SIZE};
          color:white;
          line-height:1;
          opacity:0;
          transform:translateY(${OFFSETS[i]}px);
          transition: opacity 0.2s ease,
                      transform 0.3s cubic-bezier(0.34,1.4,0.64,1);
        `, ch)
                        wrap.appendChild(s)
                        return s
                    })

                    await rf()

                    for (let i = 0; i < spans.length; i++) {
                        await wait(60)
                        spans[i].style.opacity = '1'
                    }
                    await wait(180)

                    spans.forEach(s => {
                        s.style.transition = 'transform 0.4s cubic-bezier(0.22,1,0.36,1), opacity 0.3s ease'
                        s.style.transform = 'translateY(0)'
                    })
                    await wait(450)
                    return wrap
                }

                async function phase2(jpWrap) {
                    await wait(120)

                    jpWrap.style.transition = 'opacity 0.28s ease, transform 0.32s cubic-bezier(0.4,0,0.6,1)'
                    jpWrap.style.opacity = '0'
                    jpWrap.style.transform = 'translateY(-20px)'
                    await wait(340)

                    stage.innerHTML = ''

                    const SIZE = 'clamp(38px,8vw,64px)'
                    const enWrap = mk('div', `
        display:flex;align-items:center;justify-content:center;gap:1px;
        opacity:0;transform:translateY(14px);
        transition:opacity 0.3s ease, transform 0.35s cubic-bezier(0.22,1,0.36,1);
        font-family:'KronaOne','KleeOne',sans-serif;
      `)
                    'KuroKyu'.split('').forEach(ch => {
                        enWrap.appendChild(mk('span', `
          display:inline-block;
          font-size:${SIZE};
          color:white;
          line-height:1;
        `, ch))
                    })
                    stage.appendChild(enWrap)

                    await rf()
                    enWrap.style.opacity = '1'
                    enWrap.style.transform = 'translateY(0)'
                    await wait(520)

                    enWrap.style.transition = 'opacity 0.28s ease, transform 0.32s cubic-bezier(0.4,0,0.6,1)'
                    enWrap.style.opacity = '0'
                    enWrap.style.transform = 'translateY(-20px)'
                    await wait(340)
                }

                async function phase3() {
                    stage.innerHTML = ''
                    const em = mk('span', `
        display:inline-block;
        font-family:'KleeOne', serif;
        font-size:clamp(36px,7vw,58px);
        color:white;
        line-height:1;
        opacity:0;
        transform:translateY(16px);
        transition: opacity 0.32s ease,
                    transform 0.38s cubic-bezier(0.22,1,0.36,1);
        user-select:none;
      `, '＞︿＜')
                    stage.appendChild(em)
                    await rf()
                    em.style.opacity = '1'
                    em.style.transform = 'translateY(0)'
                    await wait(650)
                    return em
                }

                async function exitAnim(emEl) {
                    const rect = emEl.getBoundingClientRect()
                    const cx = rect.left + rect.width / 2
                    const cy = rect.top + rect.height / 2

                    for (let i = 0; i < 40; i++) {
                        const p = document.createElement('div')
                        const ang = Math.random() * 360
                        const d = 60 + Math.random() * 160
                        const tx = Math.cos(ang * Math.PI / 180) * d
                        const ty = Math.sin(ang * Math.PI / 180) * d - Math.random() * 80
                        const sz = 3 + Math.random() * 6
                        const dur = 0.4 + Math.random() * 0.4
                        const dl = Math.random() * 0.15
                        const ch = ['·', '•', '˙', '∘'][Math.floor(Math.random() * 4)]
                        p.textContent = ch
                        p.style.cssText = `
          position:absolute;
          left:${cx}px; top:${cy}px;
          font-size:${sz}px;
          color:${C};
          --tx:${tx}px; --ty:${ty}px;
          --tr:${(Math.random() - .5) * 480}deg;
          animation: drift ${dur}s ease-out ${dl}s forwards;
          pointer-events:none;
        `
                        parts.appendChild(p)
                    }

                    emEl.style.transition = 'transform 0.35s ease, opacity 0.3s ease'
                    emEl.style.transform = 'scale(0) rotate(15deg)'
                    emEl.style.opacity = '0'

                    await wait(350)

                    document.body.classList.add('exit')
                    await wait(520)

                    sessionStorage.setItem('loaded', '1')
                    window.location.replace('/index.html')
                }

                async function run() {
                    await rf()
                    box.classList.add('show')
                    await wait(200)

                    const jpWrap = await phase1()
                    await phase2(jpWrap)
                    const em = await phase3()
                    await exitAnim(em)
                }

                run()
            })()
    </script>

    <canvas id="cur" style="position:fixed;inset:0;pointer-events:none;z-index:9999;"></canvas>

    <script>

            //     }
            //     draw()
            // })()

            ; (function () {
                const box = document.getElementById('box')
                let tx = 0, ty = 0
                let cx = 0, cy = 0

                document.addEventListener('mousemove', e => {
                    const dx = (e.clientX - innerWidth / 2) / (innerWidth / 2)
                    const dy = (e.clientY - innerHeight / 2) / (innerHeight / 2)
                    tx = dy * -80
                    ty = dx * 80
                })

                document.addEventListener('mouseleave', () => { tx = 0; ty = 0 })

                    ; (function loop() {
                        requestAnimationFrame(loop)
                        cx += (tx - cx) * 0.08
                        cy += (ty - cy) * 0.08
                        box.style.transform = `perspective(800px) rotateX(${cx}deg) rotateY(${cy}deg)`
                    })()
            })()
    </script>

</body>

</html>
