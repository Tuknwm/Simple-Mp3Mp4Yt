<!DOCTYPE html>

      width: 14px;
      height: 14px;

      border-top-color: var(--text);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
    }

</head>

<body>


  <canvas id="paperGrain" style="
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 9998;
  opacity: 0.35;
"></canvas>

  <script>
    (function () {
      const canvas = document.getElementById('paperGrain')
      const ctx = canvas.getContext('2d')

      const CONFIG = {
        opacity: 0.1,
        fps: 12,
        grainSize: 1,
      }

      canvas.style.opacity = CONFIG.opacity

      let lastFrame = 0

      function resize() {
        canvas.width = window.innerWidth
        canvas.height = window.innerHeight
      }
      resize()
      window.addEventListener('resize', resize)

      function drawGrain() {
        const w = canvas.width
        const h = canvas.height
        const imageData = ctx.createImageData(w, h)
        const data = imageData.data

        for (let i = 0; i < data.length; i += 4) {
          const v = Math.random() * 255 | 0
          data[i] = v
          data[i + 1] = v
          data[i + 2] = v
          data[i + 3] = 255
        }
        ctx.putImageData(imageData, 0, 0)

        if (CONFIG.grainSize > 1) {
          const gs = CONFIG.grainSize
          const temp = document.createElement('canvas')
          temp.width = Math.ceil(w / gs)
          temp.height = Math.ceil(h / gs)
          const tctx = temp.getContext('2d')
          tctx.drawImage(canvas, 0, 0, temp.width, temp.height)
          ctx.clearRect(0, 0, w, h)
          ctx.imageSmoothingEnabled = false
          ctx.drawImage(temp, 0, 0, w, h)
        }
      }

      function loop(ts) {
        requestAnimationFrame(loop)
        if (ts - lastFrame < 1000 / CONFIG.fps) return
        lastFrame = ts
        drawGrain()
      }

      loop(0)
    })()
  </script>

  <canvas id="mouseTrail" style="
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 9999;
"></canvas>

  <script>
      (function () {
        const canvas = document.getElementById('mouseTrail')
        const ctx = canvas.getContext('2d')

        const CONFIG = {
          color: '#111111',
          maxPoints: 50,
          dashSize: 5,
          gapSize: 10,
          maxWidth: 5,
        }

        let points = []

        function resize() {
          canvas.width = window.innerWidth
          canvas.height = window.innerHeight
        }
        resize()
        window.addEventListener('resize', resize)

        document.addEventListener('mousemove', e => {
          points.push({ x: e.clientX, y: e.clientY })
          if (points.length > CONFIG.maxPoints) points.shift()
        })

        function hexToRgba(hex, alpha) {
          const r = parseInt(hex.slice(1, 3), 16)
          const g = parseInt(hex.slice(3, 5), 16)
          const b = parseInt(hex.slice(5, 7), 16)
          return `rgba(${r},${g},${b},${alpha})`
        }

        function draw() {
          requestAnimationFrame(draw)
          ctx.clearRect(0, 0, canvas.width, canvas.height)
          if (points.length < 2) return

          for (let i = 1; i < points.length; i++) {
            const progress = i / points.length
            const alpha = progress * 0.85
            const width = progress * CONFIG.maxWidth + 0.5

            ctx.beginPath()
            ctx.setLineDash([CONFIG.dashSize, CONFIG.gapSize])
            ctx.lineDashOffset = -i * 1.5
            ctx.strokeStyle = hexToRgba(CONFIG.color, alpha)
            ctx.lineWidth = width
            ctx.lineCap = 'round'
            ctx.moveTo(points[i - 1].x, points[i - 1].y)
            ctx.lineTo(points[i].x, points[i].y)
            ctx.stroke()
          }

          const tip = points[points.length - 1]
          ctx.beginPath()
          ctx.setLineDash([])
          ctx.arc(tip.x, tip.y, 3, 0, Math.PI * 2)
          ctx.fillStyle = hexToRgba(CONFIG.color, 0.9)
          ctx.fill()
        }

        draw()
      })()
  </script>

  <div class="app">

    <aside class="info-panel">
      <div class="info-inner">
        <div class="info-top">

                </svg>
                GitHub 🡵

            </div>
          </div>
        </div>
      </div>

    <main class="form-panel">
      <div class="form-inner">
        <h2 class="form-title">Hi There! ＞︿＜<br><span class="info-email">Fill the form below to download.</span></h2>

        <div class="field">
          <label class="field-label" for="urlInput">YouTube URL</label>
          <div class="field-input-wrap">
            <input id="urlInput" class="field-input" type="text" placeholder="Paste your link" autocomplete="off"
              spellcheck="false" />
            <button id="clearBtn" class="clear-btn" onclick="clearInput()" style="display:none">✕</button>
          </div>
        </div>

        <div class="field">
          <label class="field-label">Format</label>
          <div class="format-options">
            <span class="format-opt active" id="optMp4" onclick="setFormat('mp4')">MP4</span>
            <span class="format-sep">|</span>
            <span class="format-opt" id="optMp3" onclick="setFormat('mp3')">MP3</span>
          </div>
        </div>

        <div>
          <button class="submit-btn" id="submitBtn" onclick="startDownload()">
            <span class="submit-text">Download</span>
            <span class="submit-arrow">→</span>
          </button>
        </div>

        <p class="status" id="status"></p>

        <div class="progress" id="progress">
          <div class="progress-fill" id="progressFill"></div>
          <span class="progress-label" id="progressLabel"></span>
        </div>

        <div class="preview" id="preview">
          <img class="preview-thumb" id="previewThumb" src="" alt="thumbnail" />
          <div class="preview-info">
            <p class="preview-title" id="previewTitle"></p>
            <p class="preview-channel" id="previewChannel"></p>
            <p class="preview-duration" id="previewDuration"></p>
          </div>
        </div>

        <a class="dl-link" id="dlLink" href="#" download>
          <span></span>
        </a>

      </div>
    </main>

  </div>
  <script type="module" src="/src/main.js"></script>
